<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chorégraphie de Bien-Être</title>

<style>
body{margin:0;font-family:sans-serif}

/* IMPORTANT FIX */
.reveal{
  opacity:1;
  transform:none;
  transition:all .6s ease;
}
.reveal.visible{
  opacity:1;
  transform:none;
}
</style>
</head>

<body>

<section style="height:100vh;display:flex;align-items:center;justify-content:center;background:#eee">
  <h1>HERO</h1>
</section>

<section class="reveal" style="height:100vh;background:#ccc">
  <h2>SECTION 1</h2>
</section>

<section class="reveal" style="height:100vh;background:#aaa">
  <h2>SECTION 2</h2>
</section>

<script>
/* ========== SAFE INIT ========== */
document.addEventListener("DOMContentLoaded", () => {

  /* ---------- REVEAL (safe) ---------- */
  try{
    const elements = document.querySelectorAll('.reveal');

    if('IntersectionObserver' in window){
      const observer = new IntersectionObserver(entries=>{
        entries.forEach(entry=>{
          if(entry.isIntersecting){
            entry.target.classList.add('visible');
          }
        });
      },{threshold:0.1});

      elements.forEach(el=>observer.observe(el));
    } else {
      // fallback
      elements.forEach(el=>el.classList.add('visible'));
    }
  }catch(e){
    console.warn('Reveal error:', e);
  }


  /* ---------- MOBILE NAV ---------- */
  try{
    const burger = document.getElementById('burger');
    const mobileNav = document.getElementById('mobile-nav');

    if(burger && mobileNav){
      burger.addEventListener('click', ()=>{
        mobileNav.classList.add('open');
        document.body.style.overflow='hidden';
      });
    }

    window.closeMob = function(){
      if(mobileNav){
        mobileNav.classList.remove('open');
        document.body.style.overflow='';
      }
    }

  }catch(e){
    console.warn('Nav error:', e);
  }


  /* ---------- MODAL ---------- */
  try{
    const modal = document.getElementById('modalOverlay');

    window.openModal = function(){
      if(modal){
        modal.classList.add('open');
        document.body.style.overflow='hidden';
      }
    }

    window.closeModal = function(){
      if(modal){
        modal.classList.remove('open');
        document.body.style.overflow='';
      }
    }

  }catch(e){
    console.warn('Modal error:', e);
  }


  /* ---------- FORM ---------- */
  window.submitForm = async function(e){
    e.preventDefault();

    const f = e.target;

    try{
      await fetch("https://formspree.io/f/xqegrodq",{
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          email:f.email?.value || ""
        })
      });

      alert("OK");

    }catch(err){
      alert("Erreur envoi");
    }
  }

});
</script>

</body>
</html>
